name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  public-boundary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_public_boundary.py

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --workspaces=false
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  api-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api-go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api-go/go.mod
          cache: true
      - run: go test ./...
      - run: go build ./cmd/platform-api
